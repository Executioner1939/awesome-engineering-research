name: claude-respond

# Triggered when something mentions @claude on an agent-authored PR (review
# body, comment, review comment, or PR body). The action runs in agent mode,
# pushes commits to the PR branch, which re-triggers auto-review.yml on
# synchronize. Loop continues until auto-review APPROVES or the user takes over.

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-respond-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  respond:
    # Only act on PRs that carry the agent-authored label. Skip drive-by
    # comments on unrelated issues.
    if: |
      (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request != null
          && contains(github.event.issue.labels.*.name, 'agent-authored')
          && contains(github.event.comment.body, '@claude'))
        || (github.event_name == 'pull_request_review'
            && contains(github.event.pull_request.labels.*.name, 'agent-authored')
            && contains(github.event.review.body, '@claude'))
        || (github.event_name == 'pull_request_review_comment'
            && contains(github.event.pull_request.labels.*.name, 'agent-authored')
            && contains(github.event.comment.body, '@claude'))
        || (github.event_name == 'pull_request'
            && contains(github.event.pull_request.labels.*.name, 'agent-authored')
            && contains(github.event.pull_request.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.event.issue.pull_request.head.ref || github.head_ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Claude addresses the review feedback
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No explicit mode — the action auto-detects from the event type.
          # For issue_comment / pull_request_review with @claude, it enters
          # agent mode against the PR's current branch.
          allowed_tools: "Read,Edit,Write,Bash,Grep,Glob,Skill"
          trigger_phrase: "@claude"
