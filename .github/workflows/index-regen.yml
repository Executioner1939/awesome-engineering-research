name: index-regen

# Regenerates README.md from INDEX/ on any PR that changes the canonical data.
# Quality review of the PR itself lives in auto-review.yml (for agent-authored
# PRs) or is left to human reviewers (for everyone else).

on:
  pull_request:
    paths:
      - "INDEX/**"
      - "_archived/**"
      - ".claude/templates/README.template.md"
      - ".github/scripts/regen-readme.py"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: index-regen-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Regenerate README from INDEX
        id: regen
        run: |
          python3 .github/scripts/regen-readme.py \
            --sources INDEX/sources.md \
            --tools INDEX/tools.md \
            --template .claude/templates/README.template.md \
            --taxonomy .claude/skills/research-standard/TAXONOMY/domains.md \
            --triage TRIAGE.md \
            --output README.md
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit regenerated README
        if: steps.regen.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): regenerate from INDEX"
          git push
